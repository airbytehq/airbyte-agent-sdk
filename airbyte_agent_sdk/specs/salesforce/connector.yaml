          type: string
          description: Unique identifier
        Title:
          type: string
          description: File title/name
        FileExtension:
          type: string
          description: File extension (e.g., pdf, docx)
        ContentSize:
          type: integer
          description: File size in bytes
        ContentDocumentId:
          type: string
          description: ID of the parent ContentDocument
        VersionNumber:
          type: string
          description: Version number of the file
        IsLatest:
          type: boolean
          description: Whether this is the latest version
        attributes:
          type: object
          properties:
            type:
              type: string
            url:
              type: string

    ContentVersionQueryResult:
      type: object
      description: SOQL query result for content versions
      properties:
        totalSize:
          type: integer
        done:
          type: boolean
        nextRecordsUrl:
          type: string
        records:
          type: array
          items:
            $ref: "#/components/schemas/ContentVersion"

    # ============================================
    # Attachment Schemas (Legacy)
    # ============================================
    Attachment:
      type: object
      x-airbyte-entity-name: attachments
      x-airbyte-stream-name: Attachment
      description: Salesforce Attachment object - legacy file attachment on a record
      additionalProperties: true
      properties:
        Id:
          type: string
          description: Unique identifier
        Name:
          type: string
          description: File name
        ContentType:
          type: string
          description: MIME type of the file
        BodyLength:
          type: integer
          description: File size in bytes
        ParentId:
          type: string
          description: ID of the parent record this attachment is attached to
        attributes:
          type: object
          properties:
            type:
              type: string
            url:
              type: string

    AttachmentQueryResult:
      type: object
      description: SOQL query result for attachments
      properties:
        totalSize:
          type: integer
        done:
          type: boolean
        nextRecordsUrl:
          type: string
        records:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"

    # ============================================
    # Report Schemas (Analytics API)
    # ============================================
    Report:
      type: object
      x-airbyte-entity-name: reports
      x-airbyte-stream-name: Report
      description: Salesforce Report metadata from the Analytics API
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for the report
        name:
          type:
            - "null"
            - string
          description: Name of the report
        url:
          type:
            - "null"
            - string
          description: API URL to access the report
        describeUrl:
          type:
            - "null"
            - string
          description: API URL to get the report describe/metadata
        instancesUrl:
          type:
            - "null"
            - string
          description: API URL for async report run instances

    ReportResults:
      type: object
      description: Executed report results including data rows, aggregates, and metadata
      additionalProperties: true
      properties:
        attributes:
          type:
            - "null"
            - object
          description: Report attributes including description, format, and report type
          additionalProperties: true
        reportMetadata:
          type:
            - "null"
            - object
          description: Report metadata including columns, groupings, and filters
          additionalProperties: true
        reportExtendedMetadata:
          type:
            - "null"
            - object
          description: Extended metadata including column details and data types
          additionalProperties: true
        factMap:
          type:
            - "null"
            - object
          description: Contains the report data organized by grouping keys with rows and aggregates
          additionalProperties: true
        groupingsDown:
          type:
            - "null"
            - object
          description: Row-level grouping information
          additionalProperties: true
        groupingsAcross:
          type:
            - "null"
            - object
          description: Column-level grouping information
          additionalProperties: true
        hasDetailRows:
          type:
            - "null"
            - boolean
          description: Whether the report results include detail rows
        allData:
          type:
            - "null"
            - boolean
          description: Whether all data is included (false if report was truncated)

    # ============================================
    # Generic Query Result
    # ============================================
    QueryResult:
      type: object
      x-airbyte-entity-name: query
      description: Generic SOQL query result
      properties:
        totalSize:
          type: integer
          description: Total number of records matching the query
        done:
          type: boolean
          description: Whether all records have been returned
        nextRecordsUrl:
          type: string
          description: URL to fetch next page of results (if done is false)
        records:
          type: array
          description: Array of record objects
          items:
            type: object
            additionalProperties: true

    # ============================================
    # Search Result
    # ============================================
    SearchResult:
      type: object
      description: SOSL search result
      properties:
        searchRecords:
          type: array
          description: Array of search result records
          items:
            type: object
            properties:
              Id:
                type: string
              attributes:
                type: object
                properties:
                  type:
                    type: string
                  url:
                    type: string
            additionalProperties: true
