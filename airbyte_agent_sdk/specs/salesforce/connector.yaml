        "401":
          description: Unauthorized

  # ============================================
  # REPORTS Resource (Analytics API)
  # ============================================
  /analytics/reports:
    get:
      summary: List reports
      description: |
        Returns a list of reports available in the Salesforce org.
        Each report includes metadata such as Id, Name, Format, Description, and URL.
        This uses the Analytics REST API, not SOQL.
      operationId: listReports
      x-airbyte-entity: reports
      x-airbyte-action: list
      x-airbyte-no-pagination: "Salesforce Analytics /analytics/reports returns the full list of report metadata in a single response; the Analytics Reports listing endpoint does not expose pagination parameters."
      tags:
        - Reports
      responses:
        "200":
          description: List of report metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
        "401":
          description: Unauthorized

  /analytics/reports/{id}:
    get:
      summary: Get report results
      description: |
        Executes a report synchronously and returns the report data results.
        Returns both metadata and the executed data including fact maps, aggregates, and detail rows.
        First use the list action to find available reports, then use this action to run a report and get its data.
        Note: Large reports may be truncated. For reports with more than 2,000 detail rows, consider using async report runs.
      operationId: getReport
      x-airbyte-entity: reports
      x-airbyte-action: get
      tags:
        - Reports
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Salesforce Report ID (18-character ID starting with '00O').
            Obtain this ID from the list action.
          schema:
            type: string
        - name: includeDetails
          in: query
          description: |
            Whether to include detail rows in the report results. Defaults to true.
            Set to false to get only summary/aggregate data.
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Executed report results with data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResults"
        "404":
          description: Report not found
        "401":
          description: Unauthorized

  # ============================================
  # GENERIC QUERY Resource
  # ============================================
  /query:
    get:
      summary: Execute SOQL query
      description: |
        Execute a custom SOQL query and return results. Use this for querying any Salesforce object.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
      operationId: executeQuery
      x-airbyte-entity: query
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      tags:
        - Query
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query string. Include LIMIT clause to control the number of records returned.
            Examples:
            - "SELECT Id, Name FROM Account LIMIT 100"
            - "SELECT FIELDS(STANDARD) FROM Contact WHERE AccountId = '001xx...' LIMIT 50"
            - "SELECT Id, Subject, Status FROM Case WHERE CreatedDate = TODAY"
          schema:
            type: string
            default: "SELECT Id FROM Organization LIMIT 1"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: Salesforce OAuth 2.0 authentication via Connected App
      flows:
        authorizationCode:
          authorizationUrl: https://login.salesforce.com/services/oauth2/authorize
          tokenUrl: https://login.salesforce.com/services/oauth2/token
          refreshUrl: https://login.salesforce.com/services/oauth2/token
          scopes:
            api: Access and manage your data
            refresh_token: Perform requests on your behalf at any time
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-token-extract:
        - instance_url
      x-airbyte-auth-config:
        title: "Salesforce OAuth 2.0"
        type: object
        required:
          - refresh_token
        properties:
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "OAuth refresh token for automatic token renewal"
          client_id:
            type: string
            title: "Client ID"
            description: "Connected App Consumer Key"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Connected App Consumer Secret"
        auth_mapping:
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          client_id: "client_id"
          client_secret: "client_secret"
          refresh_token: "refresh_token"

  schemas:
    # ============================================
    # Health Check Schemas
    # ============================================
