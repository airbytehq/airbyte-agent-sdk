      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.search.nodes
      tags:
        - Discussions
      parameters:
        - name: query
          in: query
          required: true
          description: GitHub discussion search query using GitHub's search syntax
          schema:
            type: string
          examples:
            in_repo:
              summary: Discussions in a repository
              value: "repo:owner/name type:discussions"
            answered:
              summary: Answered discussions
              value: "repo:owner/name type:discussions is:answered"
            unanswered:
              summary: Unanswered discussions
              value: "repo:owner/name type:discussions is:unanswered"
            by_category:
              summary: Discussions in a specific category
              value: "repo:owner/name type:discussions category:General"
            by_author:
              summary: Discussions by a specific user
              value: "repo:owner/name type:discussions author:username"
            recent:
              summary: Recent discussions
              value: "repo:owner/name type:discussions created:>=2025-01-01"
            open_discussions:
              summary: Open discussions
              value: "repo:owner/name type:discussions is:open"
        - name: per_page
          in: query
