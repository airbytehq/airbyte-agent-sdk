        x-airbyte-body-type:
          type: graphql
          query: |
            query ListProjectItems($org: String!, $number: Int!, $first: Int!, $after: String) {
              organization(login: $org) {
                projectV2(number: $number) {
                  items(first: $first, after: $after) {
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                    nodes {
                      {{ fields }}
                    }
                  }
                }
              }
            }
