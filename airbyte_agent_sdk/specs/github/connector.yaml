openapi: 3.1.0
info:
  title: GitHub API Connector
  version: 0.1.18
  description: |
    GitHub is a platform for version control and collaborative software development
    using Git. This connector provides access to repositories, branches, commits, issues,
    pull requests, reviews, comments, releases, discussions, organizations, teams, and users for
    development workflow analysis and project management insights.
  x-airbyte-connector-name: github
  x-airbyte-connector-definition-id: ef69ef6e-aa7f-4af1-a01d-ef775033524e
  x-airbyte-replication-version: "2.1.14"
  x-airbyte-replication-compatibility: ">=2.1.14, <3.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: GitHub REST API Documentation
      url: https://docs.github.com/en/rest
    - type: api_release_history
      title: GitHub REST API Release History
      url: https://docs.github.com/en/rest/about-the-rest-api/api-versions
    - type: migration_guide
      title: GitHub REST API Migration Guide
      url: https://docs.github.com/en/rest/about-the-rest-api/breaking-changes
    - type: rate_limits
      title: GitHub REST API Rate Limits
      url: https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api
    - type: authentication_guide
      title: GitHub REST API Authentication Guide
      url: https://docs.github.com/en/rest/authentication/authenticating-to-the-rest-api
  x-airbyte-example-questions:
    direct:
      - "Show me all open issues in my repositories this month"
      - "List the top 5 repositories I've starred recently"
      - "Analyze the commit trends in my main project over the last quarter"
      - "Find all pull requests created in the past two weeks"
      - "Search for repositories related to machine learning in my organizations"
      - "Compare the number of contributors across my different team projects"
      - "Identify the most active branches in my main repository"
      - "Get details about the most recent releases in my organization"
      - "List all milestones for our current development sprint"
      - "Show me insights about pull request review patterns in our team"
      - "List all unanswered discussions in a repository"
      - "Show me recent discussions in the General category"
    unsupported:
      - "Create a new issue in the project repository"
      - "Update the status of this pull request"
      - "Delete an old branch from the repository"
      - "Schedule a team review for this code"
      - "Assign a new label to this issue"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from GitHub.
    properties:
      repositories:
        type: array
        title: GitHub Repositories
        description: "List of GitHub organizations/repositories, e.g. `airbytehq/airbyte` for single repository, `airbytehq/*` for all repositories from organization"
        items:
          type: string
    required:
      - repositories
    replication_config_key_mapping:
      repositories: repositories
  x-airbyte-skip-context-store: "Will be populated in a follow-up PR with context-store entities"

servers:
  - url: https://api.github.com
    description: GitHub API Server

security:
  - githubOAuth: []
  - githubPAT: []

components:
  securitySchemes:
    githubOAuth:
      type: oauth2
      description: GitHub OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://github.com/login/oauth/authorize
          tokenUrl: https://github.com/login/oauth/access_token
          scopes:
            repo: Full control of private repositories
            read:user: Read user profile data
            user:email: Access user email addresses
            read:org: Read organization membership
            read:discussion: Read team discussions
      x-airbyte-auth-config:
        title: "OAuth 2"
        type: object
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "OAuth 2.0 access token"
        auth_mapping:
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.option_title: "OAuth Credentials"

    githubPAT:
      type: http
      scheme: bearer
      description: Personal Access Token (PAT) authentication
      x-airbyte-auth-config:
        title: "Personal Access Token"
        type: object
        required:
          - token
        properties:
          token:
            type: string
            title: "Personal Access Token"
            description: "GitHub personal access token (fine-grained or classic)"
        auth_mapping:
          token: "${token}"
        replication_auth_key_mapping:
          credentials.personal_access_token: "token"
        replication_auth_key_constants:
          credentials.option_title: "PAT Credentials"

paths:
  /graphql:repositories:get:
    post:
      summary: Get a repository
      description: Gets information about a specific GitHub repository using GraphQL
      operationId: Repositories_Get
      x-airbyte-entity: repositories
      x-airbyte-action: get
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository
      tags:
        - Repositories
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository (username or organization)
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: |
            Optional array of field names to select.
            If not provided, uses default fields.
          schema:
            type: array
            items:
              type: string
          example:
            [
              "id",
              "name",
              "nameWithOwner",
              "stargazerCount",
              "primaryLanguage { name }",
            ]

      requestBody:
        required: true
        description: GraphQL query is automatically constructed from parameters
        x-airbyte-body-type:
          type: graphql
          query: |
            query GetRepository($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) {
                {{ fields }}
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
          default_fields: "id name nameWithOwner description url createdAt updatedAt pushedAt forkCount stargazerCount isPrivate isFork isArchived isTemplate hasIssuesEnabled hasWikiEnabled primaryLanguage { name } licenseInfo { name spdxId } owner { login avatarUrl } defaultBranchRef { name } repositoryTopics(first: 10) { nodes { topic { name } } }"

      responses:
        "200":
          description: Repository retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        description: Repository object with selected fields
        "404":
          description: Repository not found

  /graphql:repositories:list:
    post:
      summary: List repositories for a user
      description: Returns a list of repositories for the specified user using GraphQL
      operationId: Repositories_List
      x-airbyte-entity: repositories
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.user.repositories.nodes
      tags:
        - Repositories
      parameters:
        - name: username
          in: query
          required: true
          description: The username of the user whose repositories to list
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination (from previous response's endCursor)
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: |
            Optional array of field names to select.
            If not provided, uses default fields.
          schema:
            type: array
            items:
              type: string
          example:
            [
              "id",
              "name",
              "nameWithOwner",
              "stargazerCount",
              "primaryLanguage { name }",
            ]

      requestBody:
        required: true
        description: GraphQL query is automatically constructed from parameters
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListRepositories($login: String!, $first: Int!, $after: String) {
              user(login: $login) {
                repositories(first: $first, after: $after) {
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                  nodes {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            login: "{{ username }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
          default_fields: "id name nameWithOwner description url createdAt updatedAt pushedAt forkCount stargazerCount isPrivate isFork isArchived isTemplate hasIssuesEnabled hasWikiEnabled primaryLanguage { name } licenseInfo { name spdxId } owner { login avatarUrl } defaultBranchRef { name } repositoryTopics(first: 10) { nodes { topic { name } } }"

      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          repositories:
                            type: object
                            properties:
                              pageInfo:
                                type: object
                                properties:
                                  hasNextPage:
                                    type: boolean
                                  endCursor:
                                    type:
                                      - string
                                      - "null"
                              nodes:
                                type: array
                                description: Array of repository results
                                items:
                                  type: object
                                  description: Repository object with selected fields
        "404":
          description: User not found

  /graphql:repositories:
    post:
      summary: Search GitHub repositories using GraphQL
      description: |
        Search for GitHub repositories using GitHub's powerful search syntax.
        Examples: "language:python stars:>1000", "topic:machine-learning", "org:facebook is:public"
      operationId: Repositories_Search
      x-airbyte-entity: repositories
      x-airbyte-action: api_search
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.search.nodes
      tags:
        - Search
      parameters:
        - name: query
          in: query
          required: true
          description: GitHub repository search query using GitHub's search syntax
          schema:
            type: string
          examples:
            by_language_stars:
              summary: Popular repos by language
              value: "language:python stars:>1000"
            by_topic:
              summary: Repos with a specific topic
              value: "topic:machine-learning"
            org_repos:
              summary: Public repos in an organization
              value: "org:facebook is:public"
            recently_pushed:
              summary: Repos with recent activity
              value: "pushed:>=2025-01-01 stars:>100"
            by_license:
              summary: Repos with MIT license
              value: "license:mit language:typescript"
            archived_repos:
              summary: Archived repos in an org
              value: "org:myorg archived:true"
            forks_of_repo:
              summary: Forks of a repository
              value: "fork:only repo:owner/name"
        - name: limit
          in: query
          required: false
          description: Number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: after
          in: query
          required: false
          description: Cursor for pagination (from previous response's endCursor)
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: |
            Optional array of field names to select.
            If not provided, uses default fields.
          schema:
            type: array
            items:
              type: string
          example:
            [
              "id",
              "name",
              "nameWithOwner",
              "stargazerCount",
              "primaryLanguage { name }",
            ]

      requestBody:
        required: true
        description: GraphQL query is automatically constructed from parameters
        x-airbyte-body-type:
          type: graphql
          query: |
            query SearchRepositories($searchQuery: String!, $first: Int!, $after: String) {
              search(query: $searchQuery, type: REPOSITORY, first: $first, after: $after) {
                repositoryCount
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  ... on Repository {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            searchQuery: "{{ query }}"
            first: "{{ limit }}"
            after: "{{ after }}"
          default_fields: "id name nameWithOwner description url createdAt updatedAt pushedAt forkCount stargazerCount isPrivate isFork isArchived isTemplate hasIssuesEnabled hasWikiEnabled primaryLanguage { name } licenseInfo { name spdxId } owner { login avatarUrl } defaultBranchRef { name } repositoryTopics(first: 10) { nodes { topic { name } } }"

      responses:
        "200":
          description: Repository search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      search:
                        type: object
                        properties:
                          repositoryCount:
                            type: integer
                            description: Total number of repositories matching the query
                          pageInfo:
                            type: object
                            properties:
                              hasNextPage:
                                type: boolean
                              endCursor:
                                type:
                                  - string
                                  - "null"
                          nodes:
                            type: array
                            description: Array of repository results
                            items:
                              type: object
                              description: Repository object with selected fields

  # Organization Repositories endpoint
  /graphql:org_repositories:list:
    post:
      summary: List repositories for an organization
      description: Returns a list of repositories for the specified organization using GraphQL
      operationId: OrgRepositories_List
      x-airbyte-entity: org_repositories
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.organization.repositories.nodes
      tags:
        - Repositories
      parameters:
        - name: org
          in: query
          required: true
          description: The organization login/username
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListOrgRepositories($login: String!, $first: Int!, $after: String) {
              organization(login: $login) {
                repositories(first: $first, after: $after) {
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                  nodes {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            login: "{{ org }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
          default_fields: "id name nameWithOwner description url createdAt updatedAt pushedAt forkCount stargazerCount isPrivate isFork isArchived isTemplate hasIssuesEnabled hasWikiEnabled primaryLanguage { name } licenseInfo { name spdxId } owner { login avatarUrl } defaultBranchRef { name } repositoryTopics(first: 10) { nodes { topic { name } } }"

      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      organization:
                        type: object
                        properties:
                          repositories:
                            type: object
                            properties:
                              pageInfo:
                                type: object
                                properties:
                                  hasNextPage:
                                    type: boolean
                                  endCursor:
                                    type:
                                      - string
                                      - "null"
                              nodes:
                                type: array
                                items:
                                  type: object
        "404":
          description: Organization not found

  # Branches endpoints
  /graphql:branches:list:
    post:
      summary: List branches for a repository
      description: Returns a list of branches for the specified repository using GraphQL
      operationId: Branches_List
      x-airbyte-entity: branches
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.refs.nodes
      tags:
        - Branches
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListBranches($owner: String!, $name: String!, $first: Int!, $after: String) {
              repository(owner: $owner, name: $name) {
                refs(refPrefix: "refs/heads/", first: $first, after: $after) {
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                  nodes {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
          default_fields: "name prefix target { ... on Commit { oid commitUrl message author { name email date } } } associatedPullRequests(first: 1) { totalCount }"

      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          refs:
                            type: object
                            properties:
                              pageInfo:
                                type: object
                                properties:
                                  hasNextPage:
                                    type: boolean
                                  endCursor:
                                    type:
                                      - string
                                      - "null"
                              nodes:
                                type: array
                                items:
                                  type: object
        "404":
          description: Repository not found

  /graphql:branches:get:
    post:
      summary: Get a specific branch
      description: Gets information about a specific branch using GraphQL
      operationId: Branches_Get
      x-airbyte-entity: branches
      x-airbyte-action: get
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.ref
      tags:
        - Branches
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: branch
          in: query
          required: true
          description: The branch name
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query GetBranch($owner: String!, $name: String!, $branch: String!) {
              repository(owner: $owner, name: $name) {
                ref(qualifiedName: $branch) {
                  {{ fields }}
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            branch: "refs/heads/{{ branch }}"
          default_fields: "name prefix target { ... on Commit { oid commitUrl message author { name email date } } } associatedPullRequests(first: 1) { totalCount }"

      responses:
        "200":
          description: Branch retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          ref:
                            type: object
        "404":
          description: Branch not found

  # Commits endpoints
  /graphql:commits:list:
    post:
      summary: List commits for a repository
      description: Returns a list of commits for the default branch using GraphQL
      operationId: Commits_List
      x-airbyte-entity: commits
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.defaultBranchRef.target.history.nodes
      tags:
        - Commits
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: Only include commits that modified this file path (e.g. "airbyte-integrations/connectors/source-stripe/")
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListCommits($owner: String!, $name: String!, $first: Int!, $after: String, $path: String) {
              repository(owner: $owner, name: $name) {
                defaultBranchRef {
                  target {
                    ... on Commit {
                      history(first: $first, after: $after, path: $path) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          {{ fields }}
                        }
                      }
                    }
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
            path: "{{ path }}"
          default_fields: "oid message messageHeadline committedDate author { name email } additions deletions changedFiles parents(first: 5) { nodes { oid } }"

      responses:
        "200":
          description: List of commits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          defaultBranchRef:
                            type: object
                            properties:
                              target:
                                type: object
                                properties:
                                  history:
                                    type: object
                                    properties:
                                      pageInfo:
                                        type: object
                                        properties:
                                          hasNextPage:
                                            type: boolean
                                          endCursor:
                                            type:
                                              - string
                                              - "null"
                                      nodes:
                                        type: array
                                        items:
                                          type: object
        "404":
          description: Repository not found

  /graphql:commits:get:
    post:
      summary: Get a specific commit
      description: Gets information about a specific commit by SHA using GraphQL
      operationId: Commits_Get
      x-airbyte-entity: commits
      x-airbyte-action: get
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.object
      tags:
        - Commits
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: sha
          in: query
          required: true
          description: The commit SHA
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query GetCommit($owner: String!, $name: String!, $oid: GitObjectID!) {
              repository(owner: $owner, name: $name) {
                object(oid: $oid) {
                  ... on Commit {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            oid: "{{ sha }}"
          default_fields: "oid message messageHeadline committedDate author { name email } additions deletions changedFiles parents(first: 5) { nodes { oid } }"

      responses:
        "200":
          description: Commit retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          object:
                            type: object
        "404":
          description: Commit not found

  # Releases endpoints
  /graphql:releases:list:
    post:
      summary: List releases for a repository
      description: Returns a list of releases for the specified repository using GraphQL
      operationId: Releases_List
      x-airbyte-entity: releases
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.releases.nodes
      tags:
        - Releases
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
