      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query SearchDiscussions($searchQuery: String!, $first: Int!, $after: String) {
              search(query: $searchQuery, type: DISCUSSION, first: $first, after: $after) {
                discussionCount
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  ... on Discussion {
                    {{ fields }}
                  }
                }
              }
