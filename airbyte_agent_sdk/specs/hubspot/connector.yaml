      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: idProperty
        in: query
        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: Ticket object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Ticket not found
        "401":
          description: Unauthorized

  "/crm/v3/objects/tickets/search":
    post:
      summary: Search tickets
      description: Search for tickets by filtering on properties, searching through associations, and sorting results.
      operationId: searchTickets
      x-airbyte-entity: tickets
      x-airbyte-action: api_search
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        total: $.total
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filterGroups:
                  type: array
                  description: Up to 6 groups of filters defining additional query criteria.
                  required: true
                  items:
                    type: object
                    properties:
                      filters:
                        type: array
                        required: true
                        items:
                          type: object
                          properties:
                            operator:
                              type: string
                              enum: [BETWEEN, CONTAINS_TOKEN, EQ, GT, GTE, HAS_PROPERTY, IN, LT, LTE, NEQ, NOT_CONTAINS_TOKEN, NOT_HAS_PROPERTY, NOT_IN]
                              required: true
                            propertyName:
                              type: string
                              description: The name of the property to apply the filter on.
                              required: true
                            value:
                              type: string
                              description: The value to match against the property.
                            values:
                              type: array
                              description: The values to match against the property.
                              items:
                                type: string
                properties:
                  type: array
                  description: A list of property names to include in the response.
                  required: true
                  items:
                    type: string
                limit:
                  type: integer
                  description: Maximum number of results to return
                  required: true
                  minimum: 1
                  maximum: 200
                  default: 25
                after:
                  type: string
                  description: A paging cursor token for retrieving subsequent pages.
                sorts:
                  type: array
                  description: Sort criteria
                  required: true
                  items:
                    type: object
                    properties:
                      propertyName:
                        type: string
                      direction:
                        type: string
                        enum: [ASCENDING, DESCENDING]
                query:
                  type: string
                  description: The search query string, up to 3000 characters.
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketsList"
        "401":
          description: Unauthorized
        "400":
          description: Bad request

  # Schemas Entities (for discovering custom objects)
  "/crm-object-schemas/v3/schemas":
    get:
      summary: List custom object schemas
      description: Returns all custom object schemas to discover available custom objects
      operationId: listSchemas
      x-airbyte-entity: schemas
      x-airbyte-action: list
      x-airbyte-no-pagination: "HubSpot GET /crm-object-schemas/v3/schemas returns all custom object schemas defined on the portal in a single response; unlike the paged CRM object endpoints this discovery endpoint exposes no paging.next cursor or after token."
      x-airbyte-record-extractor: $.results
      parameters:
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: List of custom object schemas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemasList"
        "401":
          description: Unauthorized

  "/crm-object-schemas/v3/schemas/{objectType}":
    get:
      summary: Get a custom object schema
      description: Get the schema for a specific custom object type
      operationId: getSchema
      x-airbyte-entity: schemas
      x-airbyte-action: get
      parameters:
      - name: objectType
        in: path
        required: true
        description: Fully qualified name or object type ID of your schema.
        schema:
          type: string
      responses:
        "200":
          description: Custom object schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        "404":
          description: Schema not found
        "401":
          description: Unauthorized

  # Generic Objects Entities (for custom objects)
  "/crm/v3/objects/{objectType}":
    get:
      summary: List objects
      description: Read a page of objects. Control what is returned via the properties query param.
      operationId: listObjects
      x-airbyte-entity: objects
      x-airbyte-action: list
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      parameters:
      - name: objectType
        in: path
        required: true
        description: Object type ID or fully qualified name (e.g., "cars" or "p12345_cars")
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of results to display per page.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: The paging cursor token of the last successfully read resource will be returned as the `paging.next.after` JSON property of a paged response containing more results.
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
          default: false
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      responses:
        "200":
          description: List of objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectsList"
        "401":
          description: Unauthorized
        "404":
          description: Object type not found

  "/crm/v3/objects/{objectType}/{objectId}":
    get:
      summary: Get an object
      description: Read an Object identified by {objectId}. {objectId} refers to the internal object ID by default, or optionally any unique property value as specified by the idProperty query param. Control what is returned via the properties query param.
      operationId: getObject
      x-airbyte-entity: objects
      x-airbyte-action: get
      parameters:
      - name: objectType
        in: path
        required: true
        description: Object type ID or fully qualified name
        schema:
          type: string
      - name: objectId
        in: path
        required: true
        description: Object record ID
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: idProperty
        in: query
        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      responses:
        "200":
          description: Object record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CRMObject"
        "404":
          description: Object not found
        "401":
          description: Unauthorized

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: HubSpot OAuth 2.0 authentication with automatic token refresh
      flows:
        authorizationCode:
          authorizationUrl: https://app.hubspot.com/oauth/authorize
          tokenUrl: https://api.hubapi.com/oauth/v1/token
          refreshUrl: https://api.hubapi.com/oauth/v1/token
          scopes:
            oauth: OAuth access
            crm.schemas.contacts.read: Read contact schemas
            crm.objects.contacts.read: Read contacts
            crm.objects.companies.read: Read companies
            crm.schemas.companies.read: Read company schemas
            crm.objects.deals.read: Read deals
            crm.schemas.deals.read: Read deal schemas
            crm.objects.custom.read: Read custom objects
            crm.schemas.custom.read: Read custom object schemas
            crm.lists.read: Read lists
            crm.objects.goals.read: Read goals
            crm.objects.owners.read: Read owners
            crm.objects.leads.read: Read leads
            crm.objects.users.read: Read users
            settings.users.read: Read user settings
            crm.objects.courses.read: Read courses
            crm.objects.projects.read: Read projects
            crm.objects.quotes.read: Read quotes
            tickets: Read tickets
            content: Read content
            automation: Read automation
            e-commerce: Read e-commerce
            forms: Read forms
            sales-email-read: Read sales emails
      x-airbyte-oauth-scopes:
        - scope: "oauth"
          mode: read
          entities:
            - contacts
            - companies
            - deals
            - tickets
            - schemas
            - objects
        - scope: "crm.objects.contacts.read"
          mode: read
          entities:
            - contacts
            - companies
            - deals
            - tickets
        - scope: "crm.schemas.contacts.read"
          mode: read
          entities:
            - contacts
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-oauth-credentials:
        title: HubSpot OAuth App Credentials
        description: Provide your own HubSpot OAuth app credentials to override the default Airbyte-managed ones.
        properties:
          client_id:
            type: string
            title: Client ID
            description: Your HubSpot OAuth app's client ID
          client_secret:
            type: string
            title: Client Secret
            description: Your HubSpot OAuth app's client secret
        required:
        - client_id
        - client_secret
      x-airbyte-auth-config:
        title: "OAuth2"
        type: object
        required:
        - refresh_token
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "Your HubSpot OAuth2 Client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your HubSpot OAuth2 Client Secret"
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "Your HubSpot OAuth2 Refresh Token"
          access_token:
            type: string
            title: "Access Token"
            description: "Your HubSpot OAuth2 Access Token (optional if refresh_token is provided)"
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.credentials_title: "OAuth Credentials"

    hubspotPrivateApp:
      type: http
      scheme: bearer
      description: HubSpot Private App access token authentication
      x-airbyte-auth-config:
        title: "Private App"
        type: object
        required:
        - private_app_token
        properties:
          private_app_token:
            type: string
            title: "Private App Token"
            description: "Access token from a HubSpot Private App"
        auth_mapping:
          token: "${private_app_token}"
        replication_auth_key_mapping:
          credentials.access_token: "private_app_token"
        replication_auth_key_constants:
          credentials.credentials_title: "Private App Credentials"

