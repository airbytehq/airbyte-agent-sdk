      description: Generic HubSpot CRM object (for custom objects)
      properties:
        id:
          type: string
          description: Unique object identifier
        properties:
          type: object
          description: Object properties
          properties:
            hs_createdate:
              type: [string, "null"]
            hs_lastmodifieddate:
              type: [string, "null"]
            hs_object_id:
              type: [string, "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        archived:
          type: boolean
          description: Whether the object is archived
        archivedAt:
          type: [string, "null"]
          format: date-time
          description: Timestamp when the object was archived
        propertiesWithHistory:
          type: [object, "null"]
          description: Properties with historical values
          additionalProperties: true
        associations:
          type: [object, "null"]
          description: Relationships with other CRM objects
          additionalProperties: true
        objectWriteTraceId:
          type: [string, "null"]
          description: Trace identifier for write operations
        url:
          type: [string, "null"]
          description: URL to view object in HubSpot

    ObjectsList:
      type: object
      description: Paginated list of generic CRM objects
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CRMObject"
        paging:
          $ref: "#/components/schemas/Paging"

    # Shared pagination schema
    Paging:
      type: object
      description: Pagination information
      properties:
        next:
          type: object
          properties:
            after:
              type: string
              description: Cursor for next page
            link:
              type: string
              description: URL for next page
