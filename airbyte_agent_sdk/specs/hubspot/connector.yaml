# HubSpot API Connector
# OpenAPI 3.1 specification with Airbyte extensions

openapi: 3.1.0

info:
  title: HubSpot API Connector
  version: 0.1.18
  description: |
    HubSpot is a CRM platform that provides tools for marketing, sales, customer service,
    and content management. This connector provides access to contacts, companies, deals,
    tickets, and custom objects for customer relationship management and sales analytics.
  x-airbyte-connector-name: hubspot
  x-airbyte-connector-definition-id: 36c891d9-4bd9-43ac-bad2-10e12756272c
  x-airbyte-replication-version: "6.5.5"
  x-airbyte-replication-compatibility: ">=6.5.5, <7.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: HubSpot API Documentation
    url: https://developers.hubspot.com/docs/api/crm/understanding-the-crm
  x-airbyte-example-questions:
    direct:
    - "List recent deals"
    - "List recent tickets"
    - "List companies in my CRM"
    - "List contacts in my CRM"
    search:
    - "Show me all deals from {company} this quarter"
    - "What are the top 5 most valuable deals in my pipeline right now?"
    - "Search for contacts in the marketing department at {company}"
    - "Give me an overview of my sales team's deals in the last 30 days"
    - "Identify the most active companies in our CRM this month"
    - "Compare the number of deals closed by different sales representatives"
    - "Find all tickets related to a specific product issue and summarize their status"
    unsupported:
    - "Create a new contact record for {person}"
    - "Update the contact information for {customer}"
    - "Delete the ticket from last week's support case"
    - "Schedule a follow-up task for this deal"
    - "Send an email to all contacts in the sales pipeline"
  x-airbyte-entity-relationships:
  - source_entity: objects
    target_entity: schemas
    foreign_key: objectType
    target_key: fullyQualifiedName
    cardinality: many_to_one
  x-airbyte-context-store:
    disable_compaction: false
    entities:
    - entity: companies
      x-airbyte-name: companies
      suggested: true
      fields:
      - name: archived
        type:
        - 'null'
        - 'boolean'
        description: Indicates whether the company has been deleted and moved to the recycling bin
      - name: contacts
        type:
        - 'null'
        - 'array'
        description: Associated contact records linked to this company
      - name: createdAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the company record was created
      - name: id
        type:
        - 'null'
        - 'string'
        description: Unique identifier for the company record
      - name: properties
        type:
        - 'object'
        description: Object containing all property values for the company
      - name: updatedAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the company record was last modified
    - entity: contacts
      x-airbyte-name: contacts
      suggested: true
      fields:
      - name: archived
        type:
        - 'null'
        - 'boolean'
        description: Boolean flag indicating whether the contact has been archived or deleted.
      - name: companies
        type:
        - 'null'
        - 'array'
        description: Associated company records linked to this contact.
      - name: createdAt
        type:
        - 'null'
        - 'string'
        description: Timestamp indicating when the contact was first created in the system.
      - name: id
        type:
        - 'null'
        - 'string'
        description: Unique identifier for the contact record.
      - name: properties
        type:
        - 'object'
        description: "Key-value object storing all contact properties and their values."
      - name: updatedAt
        type:
        - 'null'
        - 'string'
        description: Timestamp indicating when the contact record was last modified.
    - entity: deals
      x-airbyte-name: deals
      suggested: true
      fields:
      - name: archived
        type:
        - 'null'
        - 'boolean'
        description: Indicates whether the deal has been deleted and moved to the recycling bin
      - name: companies
        type:
        - 'null'
        - 'array'
        description: Collection of company records associated with the deal
      - name: contacts
        type:
        - 'null'
        - 'array'
        description: Collection of contact records associated with the deal
      - name: createdAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the deal record was originally created
      - name: id
        type:
        - 'null'
        - 'string'
        description: Unique identifier for the deal record
      - name: line_items
        type:
        - 'null'
        - 'array'
        description: Collection of product line items associated with the deal
      - name: properties
        type:
        - 'object'
        description: "Key-value object containing all deal properties and custom fields"
      - name: updatedAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the deal record was last modified
    - entity: tickets
      x-airbyte-name: tickets
      suggested: true
      fields:
      - name: archived
        type:
        - 'null'
        - 'boolean'
        description: Indicates whether the ticket has been deleted and moved to the recycling bin
      - name: companies
        type:
        - 'null'
        - 'array'
        description: Collection of company records associated with the ticket
      - name: contacts
        type:
        - 'null'
        - 'array'
        description: Collection of contact records associated with the ticket
      - name: createdAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the ticket record was originally created
      - name: id
        type:
        - 'null'
        - 'string'
        description: Unique identifier for the ticket record
      - name: properties
        type:
        - 'object'
        description: "Key-value object containing all ticket properties and custom fields"
      - name: updatedAt
        type:
        - 'null'
        - 'string'
        description: Timestamp when the ticket record was last modified

servers:
- url: https://api.hubapi.com
  description: HubSpot API server

security:
- oauth2: []
- hubspotPrivateApp: []

paths:
  # Contacts Entities
  "/crm/v3/objects/contacts":
    get:
      summary: List contacts
      description: Returns a paginated list of contacts
      operationId: listContacts
      x-airbyte-entity: contacts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      parameters:
      - name: limit
        in: query
        description: The maximum number of results to display per page.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: The paging cursor token of the last successfully read resource will be returned as the paging.next.after JSON property of a paged response containing more results.
        schema:
          type: string
      - name: associations
        in: query
        description: A comma separated list of associated object types to include in the response. Valid values are contacts, deals, tickets, and custom object type IDs or fully qualified names (e.g., "p12345_cars").
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored. Usage of this parameter will reduce the maximum number of companies that can be read by a single request.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsList"
        "401":
          description: Unauthorized

  "/crm/v3/objects/contacts/{contactId}":
    get:
      summary: Get a contact
      description: Get a single contact by ID
      operationId: getContact
      x-airbyte-entity: contacts
      x-airbyte-action: get
      parameters:
      - name: contactId
        in: path
        required: true
        description: Contact ID
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: idProperty
        in: query
        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: Contact object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Contact not found
        "401":
          description: Unauthorized

  "/crm/v3/objects/contacts/search":
    post:
      summary: Search contacts
      description: Search for contacts by filtering on properties, searching through associations, and sorting results.
      operationId: searchContacts
      x-airbyte-entity: contacts
      x-airbyte-action: api_search
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        total: $.total
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filterGroups:
                  type: array
                  description: Up to 6 groups of filters defining additional query criteria.
                  required: true
                  items:
                    type: object
                    properties:
                      filters:
                        type: array
                        required: true
                        items:
                          type: object
                          properties:
                            operator:
                              type: string
                              enum: [BETWEEN, CONTAINS_TOKEN, EQ, GT, GTE, HAS_PROPERTY, IN, LT, LTE, NEQ, NOT_CONTAINS_TOKEN, NOT_HAS_PROPERTY, NOT_IN]
                              required: true
                            propertyName:
                              type: string
                              description: The name of the property to apply the filter on.
                              required: true
                            value:
                              type: string
                              description: The value to match against the property.
                            values:
                              type: array
                              description: The values to match against the property.
                              items:
                                type: string
                properties:
                  type: array
                  description: A list of property names to include in the response.
                  required: true
                  items:
                    type: string
                limit:
                  type: integer
                  description: Maximum number of results to return
                  required: true
                  minimum: 1
                  maximum: 200
                  default: 25
                after:
                  type: string
                  description: A paging cursor token for retrieving subsequent pages.
                sorts:
                  type: array
                  description: Sort criteria
                  required: true
                  items:
                    type: object
                    properties:
                      propertyName:
                        type: string
                      direction:
                        type: string
                        enum: [ASCENDING, DESCENDING]
                query:
                  type: string
                  description: The search query string, up to 3000 characters.
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsList"
        "401":
          description: Unauthorized
        "400":
          description: Bad request

