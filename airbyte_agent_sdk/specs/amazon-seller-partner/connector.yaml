          - name: PostedBefore
            type: ["null", "string"]
            description: Date filter for events posted before
          - name: ProductAdsPaymentEventList
            type: ["null", "array"]
            description: List of product ads payment events
          - name: RefundEventList
            type: ["null", "array"]
            description: List of refund events
          - name: RemovalShipmentAdjustmentEventList
            type: ["null", "array"]
            description: List of removal shipment adjustment events
          - name: RemovalShipmentEventList
            type: ["null", "array"]
            description: List of removal shipment events
          - name: RentalTransactionEventList
            type: ["null", "array"]
            description: List of rental transaction events
          - name: RetrochargeEventList
            type: ["null", "array"]
            description: List of retrocharge events
          - name: SAFETReimbursementEventList
            type: ["null", "array"]
            description: List of SAFET reimbursement events
          - name: SellerDealPaymentEventList
            type: ["null", "array"]
            description: List of seller deal payment events
          - name: SellerReviewEnrollmentPaymentEventList
            type: ["null", "array"]
            description: List of seller review enrollment events
          - name: ServiceFeeEventList
            type: ["null", "array"]
            description: List of service fee events
          - name: ServiceProviderCreditEventList
            type: ["null", "array"]
            description: List of service provider credit events
          - name: ShipmentEventList
            type: ["null", "array"]
            description: List of shipment events
          - name: ShipmentSettleEventList
            type: ["null", "array"]
            description: List of shipment settlement events
          - name: TDSReimbursementEventList
            type: ["null", "array"]
            description: List of TDS reimbursement events
          - name: TaxWithholdingEventList
            type: ["null", "array"]
            description: List of tax withholding events
          - name: TrialShipmentEventList
            type: ["null", "array"]
            description: List of trial shipment events
          - name: ValueAddedServiceChargeEventList
            type: ["null", "array"]
            description: List of value-added service charge events
  x-airbyte-example-questions:
    direct:
      - "List all recent orders"
      - "Show me order items for a specific order"
      - "List financial event groups"
      - "Show recent financial events"
      - "Search catalog items by keyword"
      - "List recent reports"
    search:
      - "What are my top-selling products by order volume?"
      - "Show orders from the last 30 days with status Shipped"
      - "Find financial events related to refunds"
      - "Which orders have the highest total value?"
    unsupported:
      - "Create a new order"
      - "Cancel an order"
      - "Submit a new report request"
      - "Update product listings"

servers:
  - url: "https://sellingpartnerapi-{region}.amazon.com"
    description: Amazon SP-API regional endpoint (varies by seller marketplace)
    variables:
      region:
        default: na
        description: |
          The SP-API endpoint URL based on seller region:
          - NA (North America: US, CA, MX, BR): https://sellingpartnerapi-na.amazon.com
          - EU (Europe/Middle East/Africa/India): https://sellingpartnerapi-eu.amazon.com
          - FE (Far East: JP, AU, SG): https://sellingpartnerapi-fe.amazon.com
        enum:
          - US
          - CA
          - MX
          - BR
          - NA
          - EU
          - DE
          - FR
          - IT
          - ES
          - UK
          - GB
          - IN
          - AE
          - SA
          - PL
          - NL
          - SE
          - EG
          - TR
          - BE
          - ZA
          - JP
          - AU
          - SG
          - FE
    x-airbyte-replication-environment-mapping:
      region:
        source: region
        format: >-
          {{ 'na' if value|upper in ['US', 'CA', 'MX', 'BR', 'NA']
              else 'eu' if value|upper in ['EU', 'DE', 'FR', 'IT', 'ES', 'UK', 'GB', 'IN', 'AE', 'SA', 'PL', 'NL', 'SE', 'EG', 'TR', 'BE', 'ZA']
              else 'fe' if value|upper in ['JP', 'AU', 'SG', 'FE']
              else 'na' }}
    x-airbyte-replication-environment-constants:
      aws_environment: "PRODUCTION"
      account_type: "Seller"

security:
  - oauth2: []

paths:
  /orders/v0/orders:
    get:
      summary: List orders
      description: Returns a list of orders based on the specified parameters.
      operationId: listOrders
      x-airbyte-entity: orders
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.payload.Orders
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      parameters:
        - name: MarketplaceIds
          in: query
          required: true
          description: A list of MarketplaceId values. Used to select orders placed in the specified marketplaces.
          schema:
            type: string
          x-airbyte-param-config-inject:
            source: region
            map:
              US: "ATVPDKIKX0DER"
              CA: "A2EUQ1WTGCTBG2"
              MX: "A1AM78C64UM0Y8"
              BR: "A2Q3Y263D00KWC"
              NA: "ATVPDKIKX0DER"
              DE: "A1PA6795UKMFR9"
              FR: "A13V1IB3VIYZZH"
              IT: "APJ6JRA9NG5V4"
              ES: "A1RKKUPIHCS9HS"
              UK: "A1F83G8C2ARO7P"
              GB: "A1F83G8C2ARO7P"
              IN: "A21TJRUUN4KGV"
              AE: "A2VIGQ35RCS4UG"
              SA: "A17E79C6D8DWNP"
              PL: "A1C3SOZRARQ6R3"
              NL: "A1805IZSGTT6HS"
              SE: "A2NODRKZP88ZB9"
              EG: "ARBP9OOSHTCHU"
              TR: "A33AVAJ2PDY3EV"
              BE: "AMEN7PMS3EDWL"
              EU: "A1PA6795UKMFR9"
              JP: "A1VC38T7YXB528"
              AU: "A39IBJ37TRP1C6"
              SG: "A19VAU5U5O7RUS"
              FE: "A1VC38T7YXB528"
              ZA: "AE08WJ6YKNBMC"
        - name: CreatedAfter
          in: query
          description: A date used for selecting orders created after the specified date (ISO 8601 format). Required if LastUpdatedAfter is not set.
          schema:
            type: string
            format: date-time
        - name: CreatedBefore
          in: query
          description: A date used for selecting orders created before the specified date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: LastUpdatedAfter
          in: query
          description: A date used for selecting orders that were last updated after the specified date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: LastUpdatedBefore
          in: query
          description: A date used for selecting orders that were last updated before the specified date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: OrderStatuses
          in: query
          description: Filter by order status values.
          schema:
            type: string
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersList"

  /orders/v0/orders/{orderId}:
    get:
      summary: Get an order
      description: Returns the order indicated by the specified order ID.
      operationId: getOrder
      x-airbyte-entity: orders
      x-airbyte-action: get
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.payload
      parameters:
        - name: orderId
          in: path
          required: true
          description: An Amazon order identifier in 3-7-7 format.
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /orders/v0/orders/{orderId}/orderItems:
    get:
      summary: List order items
      description: Returns detailed order item information for the order indicated by the specified order ID.
      operationId: listOrderItems
      x-airbyte-entity: order_items
      x-airbyte-action: list
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.payload.OrderItems
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      parameters:
        - name: orderId
          in: path
          required: true
          description: An Amazon order identifier in 3-7-7 format.
          schema:
            type: string
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of order items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemsList"

  /finances/v0/financialEventGroups:
    get:
      summary: List financial event groups
      description: Returns financial event groups for a given date range.
      operationId: listFinancialEventGroups
      x-airbyte-entity: list_financial_event_groups
      x-airbyte-action: list
      x-airbyte-record-extractor: $.payload.FinancialEventGroupList
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      parameters:
        - name: FinancialEventGroupStartedAfter
          in: query
          description: Return groups opened after this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: FinancialEventGroupStartedBefore
          in: query
          description: Return groups opened before this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of financial event groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEventGroupList"

  /finances/v0/financialEvents:
    get:
      summary: List financial events
      description: Returns financial events for a given date range.
      operationId: listFinancialEvents
      x-airbyte-entity: list_financial_events
      x-airbyte-action: list
      x-airbyte-record-extractor: $.payload.FinancialEvents
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      parameters:
        - name: PostedAfter
          in: query
          description: Return events posted after this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: PostedBefore
          in: query
          description: Return events posted before this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: Financial events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEventsResponse"

  /catalog/2022-04-01/items:
    get:
      summary: Search catalog items
      description: Search for items in the Amazon catalog by keywords or identifiers.
      operationId: searchCatalogItems
      x-airbyte-entity: catalog_items
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        next_token: $.pagination.nextToken
        number_of_results: $.numberOfResults
      parameters:
        - name: marketplaceIds
          in: query
          required: true
          description: A marketplace identifier.
          schema:
            type: string
          x-airbyte-param-config-inject:
