servers:
- url: https://api.twilio.com/2010-04-01
  description: Twilio REST API

security:
- basicAuth: []

paths:
  # ==================== ACCOUNTS ====================
  /Accounts.json:
    get:
      summary: List accounts
      description: Returns a list of accounts associated with the authenticated account
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.accounts
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsList"
        "401":
          description: Unauthorized

  "/Accounts/{sid}.json":
    get:
      summary: Get an account
      description: Get a single account by SID
      operationId: getAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      parameters:
      - name: sid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      responses:
        "200":
          description: Account object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
        "401":
          description: Unauthorized

  # ==================== CALLS ====================
  "/Accounts/{AccountSid}/Calls.json":
    get:
      summary: List calls
      description: Returns a list of calls made to and from an account
      operationId: listCalls
      x-airbyte-entity: calls
      x-airbyte-action: list
      x-airbyte-record-extractor: $.calls
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallsList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/Calls/{sid}.json":
    get:
      summary: Get a call
      description: Get a single call by SID
      operationId: getCall
      x-airbyte-entity: calls
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: sid
        in: path
        required: true
        description: Call SID
        schema:
          type: string
      responses:
        "200":
          description: Call object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Call not found
        "401":
          description: Unauthorized

  # ==================== MESSAGES ====================
  "/Accounts/{AccountSid}/Messages.json":
    get:
      summary: List messages
      description: Returns a list of messages associated with an account
      operationId: listMessages
      x-airbyte-entity: messages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.messages
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/Messages/{sid}.json":
    get:
      summary: Get a message
      description: Get a single message by SID
      operationId: getMessage
      x-airbyte-entity: messages
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: sid
        in: path
        required: true
        description: Message SID
        schema:
          type: string
      responses:
        "200":
          description: Message object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Message not found
        "401":
          description: Unauthorized

  # ==================== INCOMING PHONE NUMBERS ====================
  "/Accounts/{AccountSid}/IncomingPhoneNumbers.json":
    get:
      summary: List incoming phone numbers
      description: Returns a list of incoming phone numbers for an account
      operationId: listIncomingPhoneNumbers
      x-airbyte-entity: incoming_phone_numbers
      x-airbyte-action: list
      x-airbyte-record-extractor: $.incoming_phone_numbers
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of incoming phone numbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomingPhoneNumbersList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/IncomingPhoneNumbers/{sid}.json":
    get:
      summary: Get an incoming phone number
      description: Get a single incoming phone number by SID
      operationId: getIncomingPhoneNumber
      x-airbyte-entity: incoming_phone_numbers
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: sid
        in: path
        required: true
        description: Incoming phone number SID
        schema:
          type: string
      responses:
        "200":
          description: Incoming phone number object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomingPhoneNumber"
        "404":
          description: Incoming phone number not found
        "401":
          description: Unauthorized

  # ==================== RECORDINGS ====================
  "/Accounts/{AccountSid}/Recordings.json":
    get:
      summary: List recordings
      description: Returns a list of recordings for an account
      operationId: listRecordings
      x-airbyte-entity: recordings
      x-airbyte-action: list
      x-airbyte-record-extractor: $.recordings
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of recordings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingsList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/Recordings/{sid}.json":
    get:
      summary: Get a recording
      description: Get a single recording by SID
      operationId: getRecording
      x-airbyte-entity: recordings
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
