openapi: 3.1.0

info:
  title: Twilio API Connector
  version: 1.0.4
  description: >
    Connector for the Twilio REST API. Provides read access to core Twilio resources
    including accounts, calls, messages, recordings, conferences, incoming phone numbers,
    usage records, addresses, queues, transcriptions, and outgoing caller IDs.
    Uses HTTP Basic authentication with Account SID and Auth Token.
  x-airbyte-connector-name: twilio
  x-airbyte-connector-definition-id: b9dc6155-672e-42ea-b10d-9f1f1fb95ab1
  x-airbyte-replication-version: "0.17.4"
  x-airbyte-replication-compatibility: ">=0.17.4, <1.0.0"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Twilio.
    properties:
      start_date:
        type: string
        title: Start Date
        description: >
          UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ.
          Any data before this date will not be replicated.
        format: date-time
    required:
    - start_date
    replication_config_key_mapping:
      start_date: start_date
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Twilio API Documentation
    url: https://www.twilio.com/docs/usage/api
  x-airbyte-example-questions:
    direct:
    - "List all calls from the last 7 days"
    - "Show me recent inbound SMS messages"
    - "List all active phone numbers on my account"
    - "Show me details for a specific call"
    - "List all recordings"
    - "Show me conference calls"
    - "List usage records for my account"
    - "Show me all queues"
    - "List outgoing caller IDs"
    - "Show me addresses on my account"
    - "List transcriptions"
    search:
    - "What are my top 10 most expensive calls this month?"
    - "How many SMS messages did I send vs receive in the last 30 days?"
    - "Summarize my usage costs by category"
    - "Which phone numbers have the most incoming calls?"
    - "Show me all failed messages and their error codes"
    - "What is the average call duration for outbound calls?"
    unsupported:
    - "Send a new SMS message"
    - "Make a phone call"
    - "Purchase a new phone number"
    - "Delete a recording"
    - "Create a new queue"
  x-airbyte-entity-relationships:
  - source_entity: calls
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: messages
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: incoming_phone_numbers
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: recordings
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: conferences
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: usage_records
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: addresses
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: queues
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: transcriptions
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  - source_entity: outgoing_caller_ids
    target_entity: accounts
    foreign_key: AccountSid
    target_key: sid
    cardinality: many_to_one
  x-airbyte-context-store:
    disable_compaction: true
    entities:
    - entity: accounts
      fields:
      - name: sid
        type:
        - "null"
        - "string"
        description: The unique identifier for the account
      - name: friendly_name
        type:
        - "null"
        - "string"
        description: A user-defined friendly name for the account
      - name: status
        type:
        - "null"
        - "string"
        description: The current status of the account
      - name: type
        type:
        - "null"
        - "string"
        description: The type of the account
      - name: owner_account_sid
        type:
        - "null"
        - "string"
        description: The SID of the owner account
      - name: date_created
        type:
        - "null"
        - "string"
        description: The timestamp when the account was created
      - name: date_updated
        type:
        - "null"
        - "string"
        description: The timestamp when the account was last updated
      - name: uri
        type:
        - "null"
        - "string"
        description: The URI for accessing the account resource
    - entity: calls
      fields:
      - name: sid
        type:
        - "null"
        - "string"
        description: The unique identifier for the call
      - name: account_sid
        type:
        - "null"
        - "string"
        description: The unique identifier for the account associated with the call
      - name: to
        type:
        - "null"
        - "string"
        description: The phone number that received the call
      - name: from
        type:
        - "null"
        - "string"
        description: The phone number that made the call
      - name: status
        type:
        - "null"
        - "string"
        description: The current status of the call
      - name: direction
        type:
        - "null"
        - "string"
        description: The direction of the call (inbound or outbound)
      - name: duration
        type:
        - "null"
        - "string"
        description: The duration of the call in seconds
      - name: price
        type:
        - "null"
        - "string"
        description: The cost of the call
      - name: price_unit
        type:
        - "null"
        - "string"
        description: The currency unit of the call cost
      - name: start_time
        type:
        - "null"
