# Amazon Ads API Connector
# OpenAPI 3.1 specification with Airbyte extensions

openapi: 3.1.0

info:
  title: Amazon Ads API Connector
  version: 1.0.10
  description: |
    Amazon Ads is Amazon's advertising platform that enables sellers and vendors to promote their
    products across Amazon's marketplace. This connector provides access to advertising profiles
    for managing and analyzing advertising campaigns across different marketplaces.
  x-airbyte-connector-name: amazon-ads
  x-airbyte-connector-definition-id: c6b0a29e-1da9-4512-9002-7bfd0cba2246
  x-airbyte-replication-version: "7.3.14"
  x-airbyte-replication-compatibility: ">=7.3.14, <8.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Amazon Ads API Documentation
      url: https://advertising.amazon.com/API/docs/en-us
    - type: authentication_guide
      title: Amazon Ads Authorization Guide
      url: https://advertising.amazon.com/API/docs/en-us/get-started/authorization
    - type: rate_limits
      title: API Rate Limits
      url: https://advertising.amazon.com/API/docs/en-us/get-started/developer-notes#rate-limiting
  x-airbyte-example-questions:
    direct:
      - "List all my advertising profiles across marketplaces"
      - "Show me the profiles for my seller accounts"
      - "What marketplaces do I have advertising profiles in?"
      - "List all portfolios for one of my profiles"
      - "Show me all sponsored product campaigns"
    search:
      - "What campaigns are currently enabled?"
      - "Find campaigns with a specific targeting type"
    unsupported:
      - "Create a new advertising campaign"
      - "Update my campaign budget"
      - "Delete an ad group"
      - "Generate a performance report"
  x-airbyte-skip-suggested-streams:
    - sponsored_brands_video_report_stream
    - sponsored_display_report_stream
    - sponsored_brands_report_stream
    - sponsored_products_report_stream

