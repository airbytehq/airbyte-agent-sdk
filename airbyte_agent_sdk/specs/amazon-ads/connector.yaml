servers:
  - url: "{region}"
    description: Amazon Ads API server (region-specific)
    variables:
      region:
        default: https://advertising-api.amazon.com
        description: |
          The Amazon Ads API endpoint URL based on region:
          - NA (North America): https://advertising-api.amazon.com
          - EU (Europe): https://advertising-api-eu.amazon.com
          - FE (Far East): https://advertising-api-fe.amazon.com
        enum:
          - https://advertising-api.amazon.com
          - https://advertising-api-eu.amazon.com
          - https://advertising-api-fe.amazon.com
    x-airbyte-replication-environment-mapping:
      region:
        source: region
        format: "https://advertising-api{{ '' if value == 'NA' else '-' + value.lower() }}.amazon.com"

security:
  - oauth2: []

paths:
  # ============================================================================
  # Profiles Endpoints
  # ============================================================================
  /v2/profiles:
    get:
      summary: List profiles
      description: |
        Returns a list of advertising profiles associated with the authenticated user.
        Profiles represent an advertiser's account in a specific marketplace. Advertisers
        may have a single profile if they advertise in only one marketplace, or a separate
        profile for each marketplace if they advertise regionally or globally.
      operationId: listProfiles
      x-airbyte-entity: profiles
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      tags:
        - Profiles
      parameters:
        - name: profileTypeFilter
          in: query
          description: |
            Filter profiles by type. Comma-separated list of profile types.
            Valid values: seller, vendor, agency
          schema:
            type: string
            default: seller,vendor
        - name: Amazon-Advertising-API-ClientId
          in: header
          required: true
          description: The client ID associated with the Amazon Ads API application
          schema:
            type: string
      responses:
        "200":
          description: List of advertising profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized - Invalid or expired access token
        "403":
          description: Forbidden - Insufficient permissions
        "429":
          description: Too Many Requests - Rate limit exceeded

  /v2/profiles/{profileId}:
    get:
      summary: Get a profile
      description: |
        Retrieves a single advertising profile by its ID. The profile contains
        information about the advertiser's account in a specific marketplace.
      operationId: getProfile
      x-airbyte-entity: profiles
      x-airbyte-action: get
      tags:
        - Profiles
      parameters:
        - name: profileId
          in: path
          required: true
          description: The unique identifier of the profile
          schema:
            type: integer
            format: int64
        - name: Amazon-Advertising-API-ClientId
          in: header
          required: true
          description: The client ID associated with the Amazon Ads API application
          schema:
            type: string
      responses:
        "200":
          description: Profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized - Invalid or expired access token
        "403":
          description: Forbidden - Insufficient permissions
        "404":
          description: Profile not found

  # ============================================================================
  # Portfolios Endpoints
  # ============================================================================
  /portfolios/list:
    post:
      summary: List portfolios
      description: |
        Returns a list of portfolios for the specified profile. Portfolios are used to
        group campaigns together for organizational and budget management purposes.
      operationId: listPortfolios
      x-airbyte-entity: portfolios
      x-airbyte-action: list
      tags:
        - Portfolios
      parameters:
