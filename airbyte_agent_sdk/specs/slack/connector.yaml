              always_active:
                type:
                  - "null"
                  - "boolean"
              avatar_hash:
                type:
                  - "null"
                  - "string"
              display_name:
                type:
                  - "null"
                  - "string"
              display_name_normalized:
                type:
                  - "null"
                  - "string"
              email:
                type:
                  - "null"
                  - "string"
              fields:
                type:
