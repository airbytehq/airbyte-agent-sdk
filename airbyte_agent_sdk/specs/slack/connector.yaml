        ok:
          type: boolean
          description: Whether the request was successful
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        has_more:
          type: [boolean, "null"]
          description: Whether there are more messages
        pin_count:
          type: [integer, "null"]
          description: Number of pinned messages
        response_metadata:
          $ref: "#/components/schemas/ResponseMetadata"

    ThreadRepliesResponse:
      type: object
      description: Response containing thread replies
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Thread"
        has_more:
          type: [boolean, "null"]
          description: Whether there are more replies
        response_metadata:
          $ref: "#/components/schemas/ResponseMetadata"

    ResponseMetadata:
      type: object
      description: Response metadata including pagination
      properties:
        next_cursor:
          type: [string, "null"]
          description: Cursor for next page of results

    # ==========================================================================
    # WRITE OPERATION SCHEMAS
    # ==========================================================================

    # Message Create/Update Schemas
    MessageCreateParams:
      type: object
      description: Parameters for creating a message
      required:
        - channel
        - text
      properties:
        channel:
          type: string
          description: Channel ID, private group ID, or user ID to send message to
        text:
          type: string
          description: Message text content (supports mrkdwn formatting)
        thread_ts:
          type: string
          description: Thread timestamp to reply to (for threaded messages)
        reply_broadcast:
          type: boolean
          description: Also post reply to channel when replying to a thread
        unfurl_links:
          type: boolean
          description: Enable unfurling of primarily text-based content
        unfurl_media:
          type: boolean
          description: Enable unfurling of media content

    MessageCreateResponse:
      type: object
      description: Response from creating a message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          type: [string, "null"]
          description: Channel ID where message was posted
        ts:
          type: [string, "null"]
          description: Message timestamp (unique identifier)
        message:
          $ref: "#/components/schemas/CreatedMessage"

    CreatedMessage:
      type: object
      description: A message object returned from create/update operations
      properties:
        type:
          type: [string, "null"]
          description: Message type
        subtype:
          type: [string, "null"]
          description: Message subtype
        text:
          type: [string, "null"]
          description: Message text content
        ts:
          type: string
          description: Message timestamp (unique identifier)
        user:
          type: [string, "null"]
          description: User ID who sent the message
        bot_id:
          type: [string, "null"]
          description: Bot ID if message was sent by a bot
        app_id:
          type: [string, "null"]
          description: App ID if message was sent by an app
        team:
          type: [string, "null"]
          description: Team ID
        bot_profile:
          oneOf:
            - $ref: "#/components/schemas/BotProfile"
            - type: "null"
          description: Bot profile information

    MessageUpdateParams:
      type: object
      description: Parameters for updating a message
      required:
        - channel
        - ts
        - text
      properties:
        channel:
          type: string
          description: Channel ID containing the message
        ts:
          type: string
          description: Timestamp of the message to update
        text:
          type: string
          description: New message text content

    MessageUpdateResponse:
      type: object
      description: Response from updating a message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          type: [string, "null"]
          description: Channel ID where message was updated
        ts:
          type: [string, "null"]
          description: Message timestamp
        text:
          type: [string, "null"]
          description: Updated message text
        message:
          $ref: "#/components/schemas/CreatedMessage"

    # Channel Create/Update Schemas
    ChannelCreateParams:
      type: object
      description: Parameters for creating a channel
      required:
        - name
      properties:
        name:
          type: string
          description: Channel name (lowercase, no spaces, max 80 chars)
        is_private:
          type: boolean
          description: Create a private channel instead of public

    ChannelCreateResponse:
      type: object
      description: Response from creating a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    ChannelRenameParams:
      type: object
      description: Parameters for renaming a channel
      required:
        - channel
        - name
      properties:
        channel:
          type: string
          description: Channel ID to rename
        name:
          type: string
          description: New channel name (lowercase, no spaces, max 80 chars)

    ChannelRenameResponse:
      type: object
      description: Response from renaming a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    # Channel Topic/Purpose Schemas
    ChannelTopicParams:
      type: object
      description: Parameters for setting channel topic
      required:
        - channel
        - topic
      properties:
        channel:
          type: string
          description: Channel ID to set topic for
        topic:
          type: string
          description: New topic text (max 250 characters)

    ChannelTopicResponse:
      type: object
      description: Response from setting channel topic
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    ChannelPurposeParams:
      type: object
      description: Parameters for setting channel purpose
      required:
        - channel
        - purpose
      properties:
        channel:
          type: string
          description: Channel ID to set purpose for
        purpose:
          type: string
          description: New purpose text (max 250 characters)

    ChannelPurposeResponse:
      type: object
      description: Response from setting channel purpose
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    # Reaction Schemas
    ReactionAddParams:
      type: object
      description: Parameters for adding a reaction
      required:
        - channel
        - timestamp
        - name
      properties:
        channel:
          type: string
          description: Channel ID containing the message
        timestamp:
          type: string
          description: Timestamp of the message to react to
        name:
          type: string
          description: Reaction emoji name (without colons, e.g., "thumbsup")

    ReactionAddResponse:
      type: object
      description: Response from adding a reaction
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
