# Slack API Connector
# OpenAPI 3.1 specification with Airbyte extensions

openapi: 3.1.0

info:
  title: Slack API Connector
  version: 0.1.19
  description: |
    Slack is a business communication platform that offers messaging, file sharing, and integrations
    with other tools. This connector provides read access to users, channels, channel members, channel
    messages, and threads for workspace analytics. It also supports write operations including sending
    and updating messages, creating and renaming channels, setting channel topics and purposes, and
    adding reactions to messages.
  x-airbyte-connector-name: slack
  x-airbyte-connector-definition-id: c2281cee-86f9-4a86-bb48-d23286b4c7bd
  x-airbyte-replication-version: "3.1.12"
  x-airbyte-replication-compatibility: ">=3.1.12, <4.0.0"
  x-airbyte-example-questions:
    direct:
      - "List all users in my Slack workspace"
      - "Show me all public channels"
      - "List members of a public channel"
      - "Show me recent messages in a public channel"
      - "Show me thread replies for a recent message"
      - "List all channels I have access to"
      - "Show me user details for a workspace member"
      - "List channel members for a public channel"
      - "Send a message to a channel saying 'Hello team!'"
      - "Post a message in the general channel"
      - "Update the most recent message in a channel"
      - "Create a new public channel called 'project-updates'"
      - "Create a private channel named 'team-internal'"
      - "Rename a channel to 'new-channel-name'"
      - "Set the topic for a channel to 'Daily standup notes'"
      - "Update the purpose of a channel"
      - "Add a thumbsup reaction to the latest message in a channel"
      - "React with :rocket: to the latest message in a channel"
      - "Reply to a recent thread with 'Thanks for the update!'"
    search:
      - "What messages were posted in channel {channel_id} last week?"
      - "Show me the conversation history for channel {channel_id}"
      - "Search for messages mentioning {keyword} in channel {channel_id}"
    unsupported:
      - "Delete a message from channel {channel_id}"
      - "Remove a reaction from a message"
      - "Archive channel {channel_id}"
      - "Invite user {user_id} to channel {channel_id}"
      - "Remove user {user_id} from channel {channel_id}"
      - "Delete channel {channel_id}"
      - "Create a new user in the workspace"
      - "Update user profile information"
  x-airbyte-skip-suggested-streams:
    - channel_members
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Slack Web API Documentation
      url: https://api.slack.com/methods
    - type: api_release_history
      title: Slack API Changelog
      url: https://api.slack.com/changelog

  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Slack.
    properties:
      start_date:
        type: string
        title: Start Date
        description: UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ from which to start replicating data.
        format: date-time
      lookback_window:
        type: integer
        title: Lookback Window
        description: Number of days to look back when syncing data (0-365).
      join_channels:
        type: boolean
        title: Join Channels
        description: Whether to automatically join public channels to sync messages.
    required:
      - start_date
      - lookback_window
      - join_channels
    replication_config_key_mapping:
      start_date: start_date
      lookback_window: lookback_window
      join_channels: join_channels

  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: channel_members
        fields:
          - name: channel_id
            type:
              - "null"
              - "string"
            description: "The unique identifier for the channel where the member is associated."
          - name: member_id
            type:
              - "null"
              - "string"
            description: "The unique identifier for the member within the channel."
      - entity: channels
        fields:
          - name: context_team_id
            type:
              - "null"
              - "string"
            description: "The unique identifier of the team context in which the channel exists."
          - name: created
            type:
              - "null"
              - "integer"
            description: "The timestamp when the channel was created."
          - name: creator
            type:
              - "null"
              - "string"
            description: "The ID of the user who created the channel."
          - name: id
            type:
              - "null"
              - "string"
            description: "The unique identifier of the channel."
          - name: is_archived
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is archived."
          - name: is_channel
            type:
              - "null"
              - "boolean"
            description: "Indicates if the entity is a channel."
          - name: is_ext_shared
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is externally shared."
          - name: is_general
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is a general channel in the workspace."
          - name: is_group
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is a group (private channel) rather than a regular channel."
          - name: is_im
            type:
              - "null"
              - "boolean"
            description: "Indicates if the entity is a direct message (IM) channel."
          - name: is_member
            type:
              - "null"
              - "boolean"
            description: "Indicates if the calling user is a member of the channel."
          - name: is_mpim
            type:
              - "null"
              - "boolean"
            description: "Indicates if the entity is a multiple person direct message (MPIM) channel."
          - name: is_org_shared
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is organization-wide shared."
          - name: is_pending_ext_shared
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is pending external shared."
          - name: is_private
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is a private channel."
          - name: is_read_only
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is read-only."
          - name: is_shared
            type:
              - "null"
              - "boolean"
            description: "Indicates if the channel is shared."
          - name: last_read
            type:
              - "null"
              - "string"
            description: "The timestamp of the user's last read message in the channel."
          - name: locale
            type:
              - "null"
              - "string"
            description: "The locale of the channel."
          - name: name
            type:
              - "null"
              - "string"
            description: "The name of the channel."
          - name: name_normalized
            type:
              - "null"
              - "string"
            description: "The normalized name of the channel."
          - name: num_members
            type:
              - "null"
              - "integer"
            description: "The number of members in the channel."
          - name: parent_conversation
            type:
              - "null"
              - "string"
            description: "The parent conversation of the channel."
          - name: pending_connected_team_ids
            type:
              - "null"
              - "array"
            description: "The IDs of teams that are pending to be connected to the channel."
          - name: pending_shared
            type:
              - "null"
              - "array"
            description: "The list of pending shared items of the channel."
          - name: previous_names
            type:
              - "null"
              - "array"
            description: "The previous names of the channel."
          - name: purpose
            type:
              - "null"
              - "object"
            description: "The purpose of the channel."
            properties:
              creator:
                type:
                  - "null"
                  - "string"
              last_set:
                type:
                  - "null"
                  - "integer"
              value:
                type:
                  - "null"
                  - "string"
          - name: shared_team_ids
            type:
              - "null"
              - "array"
            description: "The IDs of teams with which the channel is shared."
          - name: topic
            type:
              - "null"
              - "object"
            description: "The topic of the channel."
            properties:
              creator:
                type:
                  - "null"
                  - "string"
              last_set:
                type:
                  - "null"
                  - "integer"
              value:
                type:
                  - "null"
                  - "string"
          - name: unlinked
            type:
              - "null"
              - "integer"
            description: "Indicates if the channel is unlinked."
          - name: updated
            type:
              - "null"
              - "integer"
            description: "The timestamp when the channel was last updated."
      - entity: channel_messages
        fields:
          - name: type
            type:
              - "null"
              - "string"
            description: "Message type."
          - name: subtype
            type:
              - "null"
              - "string"
            description: "Message subtype."
          - name: ts
