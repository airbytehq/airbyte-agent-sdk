              - "null"
              - "boolean"
            description: "Specifies if the user is the primary owner."
          - name: is_restricted
            type:
              - "null"
              - "boolean"
            description: "Flag specifying if the user is restricted."
          - name: is_ultra_restricted
            type:
              - "null"
              - "boolean"
            description: "Indicates if the user has ultra-restricted access."
          - name: name
