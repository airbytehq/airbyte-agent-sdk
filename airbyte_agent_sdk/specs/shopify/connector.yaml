servers:
- url: https://{shop}.myshopify.com/admin/api/2025-01
  description: Shopify Admin REST API Server
  variables:
    shop:
      default: my-store
      description: Your Shopify store name (e.g., 'my-store' from my-store.myshopify.com)
  x-airbyte-replication-environment-mapping:
    shop: shop

security:
- shopifyAccessToken: []

paths:
  /customers.json:
    get:
      summary: List all customers
      description: Returns a list of customers from the store
      operationId: Customers_List
      x-airbyte-entity: customers
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.customers
      x-airbyte-meta-extractor:
        next_page_url: "@link.next"
      tags:
      - Customers
      parameters:
      - name: limit
        in: query
        description: Maximum number of results to return (max 250)
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 50
      - name: since_id
        in: query
        description: Restrict results to after the specified ID
        schema:
          type: integer
      - name: created_at_min
        in: query
        description: Show customers created after date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: created_at_max
        in: query
        description: Show customers created before date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_at_min
        in: query
        description: Show customers last updated after date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_at_max
        in: query
        description: Show customers last updated before date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"

