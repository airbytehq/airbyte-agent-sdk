          type: [string, "null"]
          description: Address line 2
        city:
          type: [string, "null"]
          description: City
        province:
          type: [string, "null"]
          description: Province/State
        country:
          type: [string, "null"]
          description: Country
        zip:
          type: [string, "null"]
          description: ZIP/Postal code
        phone:
          type: [string, "null"]
          description: Phone number
