components:
  securitySchemes:
    shopifyAccessToken:
      type: apiKey
      in: header
      name: X-Shopify-Access-Token
      description: Shopify Admin API access token
      x-airbyte-auth-config:
        title: "Access Token Authentication"
        type: object
        required:
        - api_key
        properties:
          api_key:
            type: string
            title: "Access Token"
            description: "Your Shopify Admin API access token"
        auth_mapping:
          api_key: "${api_key}"
        replication_auth_key_mapping:
          credentials.api_password: "api_key"
        replication_auth_key_constants:
          credentials.auth_method: "api_password"

  schemas:
    Customer:
      type: object
      x-airbyte-entity-name: customers
      x-airbyte-stream-name: customers
      description: A Shopify customer
      required:
      - id
      properties:
        id:
          type: integer
          description: Unique customer identifier
        email:
          type: [string, "null"]
          description: Customer email address
        accepts_marketing:
          type: [boolean, "null"]
          description: Whether the customer accepts marketing
        created_at:
          type: [string, "null"]
          format: date-time
          description: When the customer was created
        updated_at:
          type: [string, "null"]
          format: date-time
          description: When the customer was last updated
        first_name:
          type: [string, "null"]
          description: Customer first name
        last_name:
          type: [string, "null"]
          description: Customer last name
        orders_count:
          type: [integer, "null"]
          description: Number of orders
        state:
          type: [string, "null"]
          description: Customer state
        total_spent:
          type: [string, "null"]
          description: Total amount spent
        last_order_id:
          type: [integer, "null"]
          description: ID of last order
        note:
          type: [string, "null"]
          description: Note about the customer
        verified_email:
          type: [boolean, "null"]
          description: Whether email is verified
        multipass_identifier:
          type: [string, "null"]
          description: Multipass identifier
        tax_exempt:
          type: [boolean, "null"]
          description: Whether customer is tax exempt
        tags:
          type: [string, "null"]
          description: Tags associated with customer
        last_order_name:
          type: [string, "null"]
          description: Name of last order
        currency:
          type: [string, "null"]
          description: Customer currency
        phone:
          type: [string, "null"]
          description: Customer phone number
        addresses:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/CustomerAddress"
        accepts_marketing_updated_at:
          type: [string, "null"]
          format: date-time
          description: When marketing acceptance was updated
        marketing_opt_in_level:
          type: [string, "null"]
          description: Marketing opt-in level
        tax_exemptions:
          type: [array, "null"]
          items:
            type: string
        email_marketing_consent:
          oneOf:
          - $ref: "#/components/schemas/MarketingConsent"
          - type: "null"
        sms_marketing_consent:
          oneOf:
          - $ref: "#/components/schemas/MarketingConsent"
          - type: "null"
        admin_graphql_api_id:
          type: [string, "null"]
          description: GraphQL API ID
        default_address:
          oneOf:
          - $ref: "#/components/schemas/CustomerAddress"
          - type: "null"

    CustomerList:
      type: object
      properties:
        customers:
          type: array
          items:
            $ref: "#/components/schemas/Customer"

    CustomerAddress:
      type: object
      description: A customer address
      required:
      - id
      properties:
        id:
          type: integer
          description: Address ID
        customer_id:
          type: [integer, "null"]
          description: Customer ID
        first_name:
          type: [string, "null"]
          description: First name
        last_name:
          type: [string, "null"]
          description: Last name
