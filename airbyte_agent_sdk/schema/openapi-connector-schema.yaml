$defs:
  AiHints:
    additionalProperties: false
    description: 'AI hints for entity schemas — helps LLMs understand when and how
      to use an entity.


      Attached to entity response schemas via x-airbyte-ai-hints extension.

      Used by generate_tool_description() to emit per-entity guidance.'
    properties:
      summary:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: One-line description of what this entity contains
        title: Summary
      when_to_use:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: When an LLM should query this entity
        title: When To Use
      trigger_phrases:
        description: Example user queries that should trigger this entity
        items:
          type: string
        title: Trigger Phrases
        type: array
      freshness:
        anyOf:
        - enum:
          - live
          - static
          type: string
        - type: 'null'
        default: null
        description: Whether data is live or static
        title: Freshness
      example_questions:
        description: Example questions answerable by this entity
        items:
          type: string
        title: Example Questions
        type: array
      search_strategy:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Hint for LLMs on how to construct effective search queries for
          this entity
        title: Search Strategy
    title: AiHints
    type: object
  AirbyteOAuthCredentials:
    additionalProperties: false
    description: 'Airbyte OAuth credentials extension (x-airbyte-oauth-credentials).


      Describes what OAuth app credentials an organization needs to provide

      to override the default Airbyte-managed OAuth app credentials.'
    properties:
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/AuthConfigFieldSpec'
          type: object
        - type: 'null'
        default: null
        title: Properties
      required:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Required
    title: AirbyteOAuthCredentials
    type: object
  AuthConfigFieldSpec:
    additionalProperties: false
    description: 'Specification for a user-facing authentication config field.


      This defines a single input field that users provide for authentication.'
    properties:
      type:
        default: string
        enum:
        - string
        - integer
        - boolean
        - number
        title: Type
        type: string
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      format:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Format
      pattern:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Pattern
      default:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Default
    title: AuthConfigFieldSpec
    type: object
  AuthConfigSpec:
    additionalProperties: false
    description: 'Airbyte auth configuration extension (x-airbyte-auth-config).


      Defines user-facing authentication configuration and how it maps to

      the underlying OpenAPI security scheme.


      For multiple authentication methods, define separate security schemes

      rather than using oneOf within a single scheme.'
    properties:
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      type:
        anyOf:
        - const: object
          type: string
        - type: 'null'
        default: null
        title: Type
      required:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Required
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/AuthConfigFieldSpec'
          type: object
        - type: 'null'
        default: null
        title: Properties
      auth_mapping:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        title: Auth Mapping
      replication_auth_key_mapping:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        description: Mapping from source config paths (e.g., 'credentials.api_key')
          to auth config keys for direct connectors
        title: Replication Auth Key Mapping
      additional_headers:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        description: 'Extra headers to inject with auth. Values support Jinja2 {{
          variable }} template syntax to reference secrets. Example: {''Amazon-Advertising-API-ClientId'':
          ''{{ client_id }}''}'
        title: Additional Headers
      replication_auth_key_constants:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        description: 'Constant values to always inject at source config paths (e.g.,
          ''credentials.auth_type'': ''OAuth2.0'')'
        title: Replication Auth Key Constants
    title: AuthConfigSpec
    type: object
  CacheConfig:
    additionalProperties: false
    description: "Cache configuration extension (x-airbyte-context-store).\n\nDefines\
      \ cache-enabled entities and their field mappings for api_search operations.\n\
      Supports optional name aliasing via x-airbyte-name for both entities and fields,\n\
      enabling bidirectional mapping between user-facing names and cache storage names.\n\
      \nThis extension is added to the Info model and provides field-level mapping\
      \ for\nsearch operations that use cached data.\n\nExample YAML usage:\n    info:\n\
      \      title: Stripe API\n      x-airbyte-context-store:\n        entities:\n\
      \          - entity: customers\n            stream: customers\n            fields:\n\
      \              - name: email\n                type: [\"null\", \"string\"]\n\
      \                description: \"Customer email address\"\n              - name:\
      \ customer_name\n                x-airbyte-name: name\n                type:\
      \ [\"null\", \"string\"]\n                description: \"Customer full name\""
    properties:
      entities:
        items:
          $ref: '#/$defs/CacheEntityConfig'
        title: Entities
        type: array
      disable_compaction:
        default: false
        description: When true, Athena compaction (OPTIMIZE + VACUUM) is skipped for
          this connector type.
        title: Disable Compaction
        type: boolean
    required:
    - entities
    title: CacheConfig
    type: object
  CacheEntityConfig:
    additionalProperties: false
    description: 'Entity configuration for cache mapping.


      Defines a cache-enabled entity with its fields and optional name aliasing

      to map between user-facing entity names and cache storage names.


      Used in x-airbyte-context-store extension for api_search operations.'
    properties:
      entity:
        title: Entity
        type: string
      x-airbyte-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Name
      fields:
        items:
          $ref: '#/$defs/CacheFieldConfig'
        title: Fields
        type: array
      x-airbyte-skip-searchable-fields:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Reason why this entity does not define searchable fields. Entities
          in x-airbyte-context-store must either declare at least one field or set
          x-airbyte-skip-searchable-fields with a justification.
        title: X-Airbyte-Skip-Searchable-Fields
    required:
    - entity
    title: CacheEntityConfig
    type: object
  CacheFieldConfig:
    additionalProperties: false
    description: 'Field configuration for cache mapping.


      Defines a single field in a cache entity, with optional name aliasing

      to map between user-facing field names and cache storage names.


      For object-type fields, supports nested properties to define the internal structure

      of complex nested schemas.


      Used in x-airbyte-context-store extension for api_search operations.'
    properties:
      name:
        title: Name
        type: string
      x-airbyte-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Name
      type:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        title: Type
      description:
        title: Description
        type: string
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/CacheFieldProperty'
          type: object
        - type: 'null'
        default: null
        title: Properties
    required:
    - name
    - type
    - description
    title: CacheFieldConfig
    type: object
  CacheFieldProperty:
    additionalProperties: false
    description: "Nested property definition for object-type cache fields.\n\nSupports\
      \ recursive nesting to represent complex nested schemas in cache field definitions.\n\
      Used when a cache field has type 'object' and needs to define its internal structure.\n\
      \nExample YAML usage:\n    - name: collaboration\n      type: ['null', 'object']\n\
      \      description: \"Collaboration data\"\n      properties:\n        brief:\n\
      \          type: ['null', 'string']\n        comments:\n          type: ['null',\
      \ 'array']"
    properties:
      type:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        title: Type
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/CacheFieldProperty'
          type: object
        - type: 'null'
        default: null
        title: Properties
    required:
    - type
    title: CacheFieldProperty
    type: object
  Components:
    additionalProperties: false
    description: 'Reusable component definitions.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#components-object'
    properties:
      schemas:
        additionalProperties:
          $ref: '#/$defs/Schema'
        title: Schemas
        type: object
      responses:
        additionalProperties:
          $ref: '#/$defs/Response'
        title: Responses
        type: object
      parameters:
        additionalProperties:
          $ref: '#/$defs/Parameter'
        title: Parameters
        type: object
      examples:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Examples
      requestBodies:
        additionalProperties:
          $ref: '#/$defs/RequestBody'
        title: Requestbodies
        type: object
      headers:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/Header'
          type: object
        - type: 'null'
        default: null
        title: Headers
      securitySchemes:
        additionalProperties:
          $ref: '#/$defs/SecurityScheme'
        title: Securityschemes
        type: object
      links:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Links
      callbacks:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Callbacks
    title: Components
    type: object
  Contact:
    additionalProperties: false
    description: 'Contact information for the API.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#contact-object'
    properties:
      name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Name
      url:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Url
      email:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Email
    title: Contact
    type: object
  DocUrl:
    additionalProperties: false
    properties:
      url:
        title: Url
        type: string
      type:
        $ref: '#/$defs/DocUrlType'
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
    required:
    - url
    - type
    title: DocUrl
    type: object
  DocUrlType:
    enum:
    - api_deprecations
    - api_reference
    - api_release_history
    - authentication_guide
    - changelog
    - data_model_reference
    - developer_community
    - migration_guide
    - openapi_spec
    - other
    - permissions_scopes
    - rate_limits
    - sql_reference
    - status_page
    title: DocUrlType
    type: string
  EntityRelationshipConfig:
    additionalProperties: false
    description: "Entity relationship declaration for cross-entity navigation.\n\n\
      Defines a foreign-key relationship between two entities, enabling\nthe runtime\
      \ to resolve parent-child dependencies and provide\nrelationship metadata to\
      \ agents.\n\nUsed in x-airbyte-entity-relationships extension in the Info object.\n\
      \nExample YAML usage:\n    info:\n      title: My API\n      x-airbyte-entity-relationships:\n\
      \        - source_entity: contacts\n          target_entity: accounts\n    \
      \      foreign_key: account_id\n          cardinality: many_to_one\n       \
      \   description: \"Contact belongs to an account\""
    properties:
      source_entity:
        description: Entity that holds the foreign key
        title: Source Entity
        type: string
      target_entity:
        description: Entity being referenced
        title: Target Entity
        type: string
      foreign_key:
        description: Field on source_entity that references target_entity
        title: Foreign Key
        type: string
      target_key:
        default: id
        description: Field on target_entity being referenced
        title: Target Key
        type: string
      cardinality:
        anyOf:
        - enum:
          - one_to_one
          - one_to_many
          - many_to_one
          - many_to_many
          type: string
        - type: 'null'
        default: null
        description: Optional relationship cardinality
        title: Cardinality
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Human-readable description of the relationship
        title: Description
    required:
    - source_entity
    - target_entity
    - foreign_key
    title: EntityRelationshipConfig
    type: object
  EnvironmentMappingTransform:
    additionalProperties: false
    description: "Structured transform for environment mapping values.\n\nAllows transforming\
      \ environment values before storing in source_config.\n\nExample:\n    source:\
      \ subdomain\n    format: \"{value}.atlassian.net\"\n\nThe format string uses\
      \ {value} as a placeholder for the source value."
    properties:
      source:
        description: The environment config key to read the value from
        title: Source
        type: string
      format:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Optional format string to transform the value. Use {value} as
          placeholder.
        title: Format
    required:
    - source
    title: EnvironmentMappingTransform
    type: object
  ExampleQuestions:
    additionalProperties: false
    description: 'Example questions for AI connector documentation.


      Used to generate supported_questions.md and unsupported_questions.md files

      that appear in the connector''s README.'
    properties:
      direct:
        description: Example questions answerable via direct API operations
        items:
          type: string
        title: Direct
        type: array
      context_store_search:
        description: Example questions requiring cached context store search operations
        items:
          type: string
        title: Context Store Search
        type: array
      search:
        description: Deprecated alias for context_store_search example questions
        items:
          type: string
        title: Search
        type: array
      unsupported:
        description: Example questions the connector cannot handle
        items:
          type: string
        title: Unsupported
        type: array
    title: ExampleQuestions
    type: object
  ExternalDocs:
    additionalProperties: false
    description: 'External documentation reference.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#external-documentation-object'
    properties:
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      url:
        title: Url
        type: string
    required:
    - url
    title: ExternalDocs
    type: object
  GraphQLBodyConfig:
    additionalProperties: false
    description: 'GraphQL body type configuration for x-airbyte-body-type extension.


      Used when x-airbyte-body-type.type = "graphql"'
    properties:
      type:
        const: graphql
        description: Body type identifier (must be 'graphql')
        title: Type
        type: string
      query:
        description: GraphQL query or mutation string with optional template placeholders
          (e.g., {{ variable }})
        title: Query
        type: string
      variables:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        description: Variables to substitute in the GraphQL query using template syntax
          (e.g., {{ param_name }})
        title: Variables
      operationName:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Operation name for queries with multiple operations
        title: Operationname
      default_fields:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Default fields to select if not provided in request parameters.
          Can be a string or array of field names.
        title: Default Fields
      x-airbyte-nullable-variables:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Variable names that can be explicitly set to null (e.g., to unassign
          a user)
        title: X-Airbyte-Nullable-Variables
    required:
    - type
    - query
    title: GraphQLBodyConfig
    type: object
  Header:
    additionalProperties: false
    description: 'Header definition.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#header-object'
    properties:
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      required:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Required
      deprecated:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Deprecated
      schema:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Schema
      example:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Example
    title: Header
    type: object
  Info:
    additionalProperties: false
    description: 'API metadata information.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#info-object


      Extensions:

      - x-airbyte-connector-name: Name of the connector (Airbyte extension)

      - x-airbyte-connector-definition-id: UUID of the connector (Airbyte extension)

      - x-airbyte-external-documentation-urls: List of external documentation URLs
      (Airbyte extension)

      - x-airbyte-retry-config: Retry configuration for transient errors (Airbyte
      extension)

      - x-airbyte-example-questions: Example questions for AI connector README (Airbyte
      extension)

      - x-airbyte-context-store: Cache configuration for field mapping between API
      and cache schemas (Airbyte extension)

      - x-airbyte-replication-config: Replication configuration for MULTI mode connectors
      (Airbyte extension)

      - x-airbyte-entity-relationships: Entity relationship declarations (Airbyte
      extension)

      - x-airbyte-scoping: Scoping parameter resolution from config (Airbyte extension)'
    properties:
      title:
        title: Title
        type: string
      version:
        title: Version
        type: string
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      termsOfService:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Termsofservice
      contact:
        anyOf:
        - $ref: '#/$defs/Contact'
        - type: 'null'
        default: null
      license:
        anyOf:
        - $ref: '#/$defs/License'
        - type: 'null'
        default: null
      x-airbyte-connector-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Connector-Name
      x-airbyte-connector-definition-id:
        anyOf:
        - format: uuid
          type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Connector-Definition-Id
      x-airbyte-external-documentation-urls:
        items:
          $ref: '#/$defs/DocUrl'
        title: X-Airbyte-External-Documentation-Urls
        type: array
      x-airbyte-retry-config:
        anyOf:
        - $ref: '#/$defs/RetryConfig'
        - type: 'null'
        default: null
      x-airbyte-example-questions:
        anyOf:
        - $ref: '#/$defs/ExampleQuestions'
        - type: 'null'
        default: null
      x-airbyte-context-store:
        anyOf:
        - $ref: '#/$defs/CacheConfig'
        - type: 'null'
        default: null
      x-airbyte-entity-relationships:
        items:
          $ref: '#/$defs/EntityRelationshipConfig'
        title: X-Airbyte-Entity-Relationships
        type: array
      x-airbyte-scoping:
        items:
          $ref: '#/$defs/ScopingParamConfig'
        title: X-Airbyte-Scoping
        type: array
      x-airbyte-replication-config:
        anyOf:
        - $ref: '#/$defs/ReplicationConfig'
        - type: 'null'
        default: null
      x-airbyte-replication-version:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Airbyte replication connector version this connector was validated
          against
        title: X-Airbyte-Replication-Version
      x-airbyte-replication-compatibility:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Semver range of compatible replication connector versions
        title: X-Airbyte-Replication-Compatibility
      x-airbyte-skip-suggested-streams:
        description: List of Airbyte suggested streams to skip when validating cache
          entity coverage
        items:
          type: string
        title: X-Airbyte-Skip-Suggested-Streams
        type: array
      x-airbyte-skip-auth-methods:
        description: List of Airbyte auth methods to skip when validating auth compatibility.
          Use the SelectiveAuthenticator option key (e.g., 'Private App Credentials',
          'oauth2.0')
        items:
          type: string
        title: X-Airbyte-Skip-Auth-Methods
        type: array
      x-airbyte-skip-context-store:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Reason why this connector does not define x-airbyte-context-store.
          Connectors must have either x-airbyte-context-store or x-airbyte-skip-context-store
          with a justification.
        title: X-Airbyte-Skip-Context-Store
      x-airbyte-response-error-check:
        anyOf:
        - $ref: '#/$defs/ResponseErrorCheck'
        - type: 'null'
        default: null
        description: Configuration for detecting application-level errors returned
          with HTTP 200 status. Checks a field in the response body and raises an
          error when the field matches on_value.
    required:
    - title
    - version
    - x-airbyte-external-documentation-urls
    title: Info
    type: object
  License:
    additionalProperties: false
    description: 'License information for the API.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#license-object'
    properties:
      name:
        title: Name
        type: string
      url:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Url
    required:
    - name
    title: License
    type: object
  MediaType:
    additionalProperties: false
    description: 'Media type object for request/response content.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#media-type-object'
    properties:
      schema:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Schema
      example:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Example
      examples:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Examples
      encoding:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Encoding
    title: MediaType
    type: object
  OAuth2Flow:
    additionalProperties: false
    description: 'OAuth 2.0 flow configuration.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#oauth-flow-object'
    properties:
      authorizationUrl:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Authorizationurl
      tokenUrl:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Tokenurl
      refreshUrl:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Refreshurl
      scopes:
        additionalProperties:
          type: string
        title: Scopes
        type: object
    title: OAuth2Flow
    type: object
  OAuth2Flows:
    additionalProperties: false
    description: 'Collection of OAuth 2.0 flows.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#oauth-flows-object'
    properties:
      implicit:
        anyOf:
        - $ref: '#/$defs/OAuth2Flow'
        - type: 'null'
